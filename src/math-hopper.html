<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Hopper — Math Problem Frogger Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
    <link rel="preload" as="image" href="../art/tiles/road_tile.png">
    <link rel="preload" as="image" href="../art/tiles/river_tile.png">
    <link rel="preload" as="image" href="../art/tiles/grass_tile.png">
    <link rel="preload" as="image" href="../art/tiles/median_tile.png">
    <link rel="preload" as="image" href="../art/frog/frog_hop.png">
    <link rel="preload" as="image" href="../art/frog/frog_celebrate.png">
    <link rel="preload" as="image" href="../art/frog/frog_squish.png">
    <link rel="preload" as="image" href="../art/frog/frog_splash.png">
    <link rel="preload" as="image" href="../art/cars/red_car.png">
    <link rel="preload" as="image" href="../art/cars/blue_car.png">
    <link rel="preload" as="image" href="../art/cars/yellow_car.png">
    <link rel="preload" as="image" href="../art/semi_red.png">
    <link rel="preload" as="image" href="../art/semi_green.png">
    <link rel="preload" as="image" href="../art/log_short.png">
    <link rel="preload" as="image" href="../art/log_long.png">
    <link rel="preload" as="image" href="../art/fly_powerup.png">
    <link rel="preload" as="image" href="../art/lilypad_goal.png">
    <link rel="preload" as="audio" href="../audio/sfx_hop.mp3">
    <link rel="preload" as="audio" href="../audio/sfx_pickup.mp3">
    <link rel="preload" as="audio" href="../audio/sfx_splash.mp3">
    <link rel="preload" as="audio" href="../audio/sfx_squish.mp3">
    <link rel="preload" as="audio" href="../audio/sfx_wrong.mp3">
    <link rel="preload" as="audio" href="../audio/music_main.mp3">
    <style>
        /* ── Reset & base ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #4CAF50;
            --green-d: #2e7d32;
            --green-l: #a5d6a7;
            --green-xl: #e8f5e9;
            --amber: #F5A623;
            --amber-d: #e65100;
            --amber-l: #ffe0b2;
            --blue: #1565C0;
            --blue-d: #0d47a1;
            --blue-l: #bbdefb;
            --sand: #F5E6C8;
            --sand-d: #bcaaa4;
            --gold: #FFD600;
            --gold-d: #f9a825;
            --red: #e53935;
            --red-l: #ffcdd2;
            --white: #FFFFFF;
            --off-white: #fdf8f2;
            --text-dark: #1a1a1a;
            --panel-bg: rgba(21, 45, 15, 0.82);
            --panel-border: rgba(76, 175, 80, 0.45);
            --hud-radius: 14px;
            --font-head: 'Fredoka One', cursive;
            --font-body: 'Nunito', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        html,
        body {
            height: 100%;
            background: #0a1f0a;
            color: var(--white);
            font-family: var(--font-body);
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── SCREEN SYSTEM ── */
        .screen {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        /* ╔══════════════════════════════╗
           ║  SCREEN 1 — TITLE            ║
           ╚══════════════════════════════╝ */
        #screen-title {
            background:
                radial-gradient(ellipse 60% 40% at 50% 60%, rgba(76, 175, 80, 0.18) 0%, transparent 70%),
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(76, 175, 80, 0.06) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(76, 175, 80, 0.06) 40px),
                #071a07;
        }

        .title-pond {
            position: absolute;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            width: 560px;
            height: 110px;
            background: radial-gradient(ellipse 100% 60% at 50% 70%, #1565C0 0%, #0d3776 60%, transparent 100%);
            border-radius: 50%;
            opacity: 0.55;
            filter: blur(2px);
        }

        .title-logo {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .title-logo .hop {
            font-family: var(--font-head);
            font-size: 100px;
            line-height: 1;
            letter-spacing: -2px;
            color: var(--green);
            text-shadow:
                0 0 40px rgba(76, 175, 80, 0.6),
                4px 6px 0 rgba(0, 0, 0, 0.5);
            animation: pulse-logo 2.5s ease-in-out infinite;
        }

        .title-logo .math {
            font-family: var(--font-head);
            font-size: 100px;
            line-height: 1;
            letter-spacing: -2px;
            color: var(--amber);
            text-shadow:
                0 0 40px rgba(245, 166, 35, 0.5),
                4px 6px 0 rgba(0, 0, 0, 0.5);
            animation: pulse-logo 2.5s ease-in-out infinite 0.4s;
        }

        .title-logo .frog-emoji {
            font-size: 80px;
            display: block;
            margin-bottom: -8px;
            animation: bounce 1s ease-in-out infinite;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.5));
        }

        .tagline {
            font-size: 20px;
            color: var(--sand);
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
            margin: 14px 0 40px;
        }

        .play-button {
            font-family: var(--font-head);
            font-size: 32px;
            font-weight: bold;
            padding: 20px 60px;
            background: linear-gradient(135deg, var(--green) 0%, var(--green-d) 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
            transition: all 0.2s ease;
            position: relative;
            z-index: 2;
        }

        .play-button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 28px rgba(76, 175, 80, 0.6);
        }

        .play-button:active {
            transform: scale(0.98);
        }

        @keyframes pulse-logo {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.8;
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* ╔══════════════════════════════╗
           ║  SCREEN 2 — GAME             ║
           ╚══════════════════════════════╝ */
        #screen-game {
            align-items: stretch;
            justify-content: flex-start;
            flex-direction: column;
            background: #0a1f0a;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .game-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(76, 175, 80, 0.3);
            font-family: var(--font-mono);
            z-index: 100;
        }

        .hud-item {
            font-size: 24px;
            font-weight: bold;
            color: var(--gold);
        }

        .hud-item.timer {
            color: var(--red);
            font-size: 32px;
        }

        .hud-item.score {
            color: var(--green-l);
        }

        .hud-item.frog-value {
            color: var(--amber);
            font-size: 28px;
        }

        #gameCanvas {
            flex: 1;
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #1565C0 100%);
            width: 100%;
            height: 100%;
        }

        .goal-zones-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            z-index: 50;
            pointer-events: none;
        }

        .goal-equation {
            background: rgba(255, 214, 0, 0.9);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-dark);
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .goal-equation.correct {
            background: rgba(76, 175, 80, 0.95);
            color: white;
            animation: flash-green 0.3s ease;
        }

        .goal-equation.incorrect {
            animation: flash-red 0.3s ease;
        }

        @keyframes flash-green {

            0%,
            100% {
                background: rgba(76, 175, 80, 0.95);
            }

            50% {
                background: rgba(76, 175, 80, 1);
            }
        }

        @keyframes flash-red {

            0%,
            100% {
                background: rgba(255, 214, 0, 0.9);
            }

            50% {
                background: rgba(229, 57, 53, 0.9);
            }
        }

        /* ╔══════════════════════════════╗
           ║  SCREEN 3 — RESULTS          ║
           ╚══════════════════════════════╝ */
        #screen-results {
            background:
                radial-gradient(ellipse 60% 40% at 50% 60%, rgba(76, 175, 80, 0.18) 0%, transparent 70%),
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(76, 175, 80, 0.06) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(76, 175, 80, 0.06) 40px),
                #071a07;
        }

        .results-panel {
            background: var(--panel-bg);
            border: 3px solid var(--panel-border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        }

        .results-title {
            font-family: var(--font-head);
            font-size: 56px;
            color: var(--gold);
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .results-stat {
            font-size: 20px;
            margin: 16px 0;
            color: var(--sand);
        }

        .results-stat .label {
            color: var(--green-l);
            font-weight: bold;
        }

        .results-stat .value {
            color: var(--gold);
            font-family: var(--font-mono);
            font-size: 32px;
            font-weight: bold;
        }

        .results-buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            justify-content: center;
        }

        .results-buttons button {
            font-family: var(--font-head);
            font-size: 18px;
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .btn-play-again {
            background: linear-gradient(135deg, var(--green) 0%, var(--green-d) 100%);
            color: white;
            box-shadow: 0 6px 16px rgba(76, 175, 80, 0.4);
        }

        .btn-play-again:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
        }

        .btn-exit {
            background: rgba(76, 175, 80, 0.2);
            color: var(--sand);
            border: 2px solid var(--sand);
        }

        .btn-exit:hover {
            background: rgba(76, 175, 80, 0.3);
        }

        /* ── Animations & Effects ── */
        .score-popup {
            position: absolute;
            font-family: var(--font-head);
            font-size: 32px;
            font-weight: bold;
            color: var(--gold);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            animation: pop-up 1s ease-out forwards;
        }

        @keyframes pop-up {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-60px) scale(1.2);
            }
        }

        .bounce-animation {
            animation: quick-bounce 0.3s ease-out;
        }

        @keyframes quick-bounce {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- ════════════════════════════════════════════ -->
    <!-- SCREEN 1: TITLE                             -->
    <!-- ════════════════════════════════════════════ -->
    <div id="screen-title" class="screen active">
        <div class="title-pond"></div>
        <div class="title-logo">
            <div class="frog-emoji">🐸</div>
            <div class="hop">Math</div>
            <div class="math">Hopper</div>
        </div>
        <div class="tagline">Solve math, dodge traffic, reach the goal!</div>
        <button class="play-button" onclick="game.startSession()">PLAY</button>
    </div>

    <!-- ════════════════════════════════════════════ -->
    <!-- SCREEN 2: GAME                              -->
    <!-- ════════════════════════════════════════════ -->
    <div id="screen-game" class="screen">
        <div class="game-container">
            <div class="game-hud">
                <div class="hud-item timer">⏱ <span id="timer">20:00</span></div>
                <div class="hud-item score">Score: <span id="score">0</span></div>
                <div class="hud-item frog-value">Frog: <span id="frog-value">5</span></div>
            </div>
            <canvas id="gameCanvas" width="1280" height="720"></canvas>
            <div class="goal-zones-overlay" id="goalZonesOverlay"></div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════ -->
    <!-- SCREEN 3: RESULTS                           -->
    <!-- ════════════════════════════════════════════ -->
    <div id="screen-results" class="screen">
        <div class="results-panel">
            <div class="results-title">🎉 Session Complete!</div>
            <div class="results-stat">
                <div class="label">Final Score</div>
                <div class="value" id="result-score">0</div>
            </div>
            <div class="results-stat">
                <div class="label">Crossings Completed</div>
                <div class="value" id="result-crossings">0</div>
            </div>
            <div class="results-stat">
                <div class="label">Personal Best</div>
                <div class="value" id="result-best">0</div>
            </div>
            <div class="results-buttons">
                <button class="btn-play-again" onclick="game.startSession()">Play Again</button>
                <button class="btn-exit" onclick="game.backToTitle()">Exit</button>
            </div>
        </div>
    </div>

    <script>
        // ╔════════════════════════════════════════════════════════════╗
        // ║  GAME LOGIC & STATE MANAGEMENT                            ║
        // ╚════════════════════════════════════════════════════════════╝

        const game = {
            // Game state
            sessionTime: 1200, // 20 minutes in seconds
            sessionTimeRemaining: 1200,
            score: 0,
            crossingsCompleted: 0,
            bestCrossingScore: 0,
            sessionActive: false,

            // Frog state
            frogX: 6,
            frogY: 12,
            frogValue: 5,
            frogBaseValue: 5,
            frogDeathTimer: 0,
            frogAnimationFrame: 0,
            frogDirection: 0, // 0=up, 1=right, 2=down, 3=left

            // Game physics
            gridWidth: 13,
            gridHeight: 14,
            cellSize: 40,
            scrollOffset: 0,

            // Lanes
            roadLanes: [1, 2, 3, 4],
            riverLanes: [8, 9, 10, 11],
            startZone: 12,
            goalZone: 0,
            medianZone: 7,

            // Game entities
            vehicles: [],
            logs: [],
            drops: [],
            goalProblems: [],

            // Timing
            frameCount: 0,
            lastUpdateTime: Date.now(),
            crossingStartTime: Date.now(),

            // Canvas & context
            canvas: null,
            ctx: null,

            // Assets
            images: {},
            audio: {},
            audioContext: null,

            // ────────────────────────────────────────────
            // INITIALIZATION
            // ────────────────────────────────────────────
            init() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                window.addEventListener('keydown', (e) => this.handleKeyPress(e));
                window.addEventListener('touchstart', (e) => this.handleTouch(e));
                this.loadAssets();
            },

            loadAssets() {
                // Load images
                const imageAssets = [
                    { key: 'road_tile', path: '../art/tiles/road_tile.png' },
                    { key: 'river_tile', path: '../art/tiles/river_tile.png' },
                    { key: 'grass_tile', path: '../art/tiles/grass_tile.png' },
                    { key: 'median_tile', path: '../art/tiles/median_tile.png' },
                    { key: 'frog_hop', path: '../art/frog/frog_hop.png' },
                    { key: 'frog_celebrate', path: '../art/frog/frog_celebrate.png' },
                    { key: 'frog_squish', path: '../art/frog/frog_squish.png' },
                    { key: 'frog_splash', path: '../art/frog/frog_splash.png' },
                    { key: 'car_red', path: '../art/cars/red_car.png' },
                    { key: 'car_blue', path: '../art/cars/blue_car.png' },
                    { key: 'car_yellow', path: '../art/cars/yellow_car.png' },
                    { key: 'truck_red', path: '../art/semi_red.png' },
                    { key: 'truck_green', path: '../art/semi_green.png' },
                    { key: 'log_short', path: '../art/log_short.png' },
                    { key: 'log_long', path: '../art/log_long.png' },
                    { key: 'powerup', path: '../art/fly_powerup.png' },
                    { key: 'lilypad', path: '../art/lilypad_goal.png' }
                ];

                imageAssets.forEach(asset => {
                    const img = new Image();
                    img.src = asset.path;
                    img.onload = () => {
                        this.images[asset.key] = img;
                    };
                    img.onerror = () => {
                        console.warn(`Failed to load image: ${asset.path}`);
                    };
                });

                // Load audio
                const audioAssets = [
                    { key: 'hop', path: '../audio/sfx_hop.mp3' },
                    { key: 'pickup', path: '../audio/sfx_pickup.mp3' },
                    { key: 'splash', path: '../audio/sfx_splash.mp3' },
                    { key: 'squish', path: '../audio/sfx_squish.mp3' },
                    { key: 'wrong', path: '../audio/sfx_wrong.mp3' },
                    { key: 'success', path: '../audio/sfx_tick.mp3' },
                    { key: 'music', path: '../audio/music_main.mp3' }
                ];

                audioAssets.forEach(asset => {
                    const audio = new Audio();
                    audio.src = asset.path;
                    audio.preload = 'auto';
                    audio.onerror = () => {
                        console.warn(`Failed to load audio: ${asset.path}`);
                    };
                    this.audio[asset.key] = audio;
                });

                // Initialize Web Audio API
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.log('Web Audio API not available', e);
                }
            },

            // ────────────────────────────────────────────
            // SESSION MANAGEMENT
            // ────────────────────────────────────────────
            startSession() {
                this.sessionTimeRemaining = this.sessionTime;
                this.score = 0;
                this.crossingsCompleted = 0;
                this.bestCrossingScore = 0;
                this.sessionActive = true;
                this.frameCount = 0;

                this.showScreen('game');
                this.resetCrossing();
                this.generateGoalProblems();
                this.generateVehicles();
                this.generateLogs();
                this.generateDrops();

                this.lastUpdateTime = Date.now();
                this.gameLoop();
            },

            endSession() {
                this.sessionActive = false;
                document.getElementById('result-score').textContent = this.score;
                document.getElementById('result-crossings').textContent = this.crossingsCompleted;
                document.getElementById('result-best').textContent = this.bestCrossingScore;
                this.showScreen('results');
            },

            backToTitle() {
                this.sessionActive = false;
                this.showScreen('title');
            },

            // ────────────────────────────────────────────
            // CROSSING MANAGEMENT
            // ────────────────────────────────────────────
            resetCrossing() {
                this.frogX = 6;
                this.frogY = this.startZone;
                this.frogValue = this.frogBaseValue;
                this.frogDeathTimer = 0;
                this.frogAnimationFrame = 0;
                this.crossingStartTime = Date.now();
                this.updateHUD();
            },

            successfulCrossing(goalValue) {
                const elapsedSeconds = (Date.now() - this.crossingStartTime) / 1000;
                const speedBonus = Math.max(0, Math.floor(60 - elapsedSeconds));
                const crossingScore = 100 + speedBonus;

                this.score += crossingScore;
                this.crossingsCompleted++;
                if (crossingScore > this.bestCrossingScore) {
                    this.bestCrossingScore = crossingScore;
                }

                this.playSound('success');
                this.showScorePopup(this.frogX, this.frogY, `+${crossingScore}`);

                setTimeout(() => {
                    if (this.sessionActive) {
                        this.generateGoalProblems();
                        this.generateDrops();
                        this.resetCrossing();
                    }
                }, 1500);
            },

            frogDeath(cause = 'vehicle') {
                if (this.frogDeathTimer > 0) return;
                this.frogDeathTimer = 0.8;
                this.playSound(cause === 'water' ? 'splash' : 'squish');
            },

            // ────────────────────────────────────────────
            // PROBLEM GENERATION
            // ────────────────────────────────────────────
            generateGoalProblems() {
                this.goalProblems = [];
                const operations = ['+', '-', '*', '/'];
                const difficulty = Math.min(5, Math.floor(this.crossingsCompleted / 3));

                for (let i = 0; i < 5; i++) {
                    const op = operations[Math.floor(Math.random() * operations.length)];
                    let problem = this.generateProblem(op, difficulty);
                    this.goalProblems.push(problem);
                }

                this.renderGoalEquations();
            },

            generateProblem(operation, difficulty) {
                let num1, num2, answer, equation;
                const range = 5 + difficulty * 3;

                switch (operation) {
                    case '+':
                        num1 = Math.floor(Math.random() * range) + 1;
                        num2 = Math.floor(Math.random() * range) + 1;
                        answer = num1 + num2;
                        equation = `${num1} + ${num2} = ?`;
                        break;
                    case '-':
                        num1 = Math.floor(Math.random() * range) + 5;
                        num2 = Math.floor(Math.random() * num1);
                        answer = num1 - num2;
                        equation = `${num1} - ${num2} = ?`;
                        break;
                    case '*':
                        num1 = Math.floor(Math.random() * (range / 2)) + 1;
                        num2 = Math.floor(Math.random() * (range / 2)) + 1;
                        answer = num1 * num2;
                        equation = `${num1} × ${num2} = ?`;
                        break;
                    case '/':
                        num2 = Math.floor(Math.random() * (range / 3)) + 1;
                        answer = Math.floor(Math.random() * range) + 1;
                        num1 = answer * num2;
                        equation = `${num1} ÷ ${num2} = ?`;
                        break;
                }

                return { equation, answer, operation };
            },

            renderGoalEquations() {
                const overlay = document.getElementById('goalZonesOverlay');
                overlay.innerHTML = '';

                for (let i = 0; i < this.goalProblems.length; i++) {
                    const div = document.createElement('div');
                    div.className = 'goal-equation';
                    div.textContent = this.goalProblems[i].equation;
                    overlay.appendChild(div);
                }
            },

            // ────────────────────────────────────────────
            // ENTITY GENERATION
            // ────────────────────────────────────────────
            generateVehicles() {
                this.vehicles = [];
                const carSpeeds = [1.5, 2, 2.5, 3];
                const truckSpeeds = [1, 1.5, 2];

                for (let lane of this.roadLanes) {
                    const laneDirection = lane % 2 === 0 ? 1 : -1;
                    const speed = (lane % 2 === 0 ? carSpeeds : truckSpeeds)[
                        Math.floor(Math.random() * (lane % 2 === 0 ? carSpeeds.length : truckSpeeds.length))
                    ];

                    for (let i = 0; i < (lane % 2 === 0 ? 3 : 2); i++) {
                        const x = Math.random() * (this.gridWidth + 8) - 4; // Wider range to span whole screen
                        const width = lane % 2 === 0 ? 1 : 3;
                        this.vehicles.push({
                            x, y: lane, width,
                            speed: speed * laneDirection,
                            isTruck: lane % 2 === 1,
                            spriteIndex: Math.floor(Math.random() * 3) // For car color variety
                        });
                    }
                }
            },

            generateLogs() {
                this.logs = [];
                const logSpeeds = [0.8, 1, 1.2, 1.5];

                for (let lane of this.riverLanes) {
                    const laneDirection = lane % 2 === 0 ? 1 : -1;
                    const speed = logSpeeds[Math.floor(Math.random() * logSpeeds.length)];
                    const logLength = Math.random() > 0.5 ? 4 : 2;

                    for (let i = 0; i < 3; i++) {
                        const x = (i * (this.gridWidth + 8) / 3) + Math.random() * 2 - 4; // Wider range
                        this.logs.push({
                            x, y: lane, length: logLength,
                            speed: speed * laneDirection
                        });
                    }
                }
            },

            generateDrops() {
                this.drops = [];
                const operations = ['+', '-', '*', '/'];
                const dropCount = 6 + Math.floor(Math.random() * 4);

                for (let i = 0; i < dropCount; i++) {
                    let validPosition = false;
                    let x, y;

                    while (!validPosition) {
                        x = Math.floor(Math.random() * this.gridWidth);
                        y = Math.floor(Math.random() * (this.gridHeight - 2)) + 1;

                        // Avoid start zone
                        if (y === this.startZone) continue;
                        // Avoid goal zone
                        if (y === this.goalZone) continue;

                        validPosition = true;
                    }

                    const op = operations[Math.floor(Math.random() * operations.length)];
                    const value = Math.floor(Math.random() * 5) + 1;

                    this.drops.push({ x, y, operation: op, value });
                }
            },

            // ────────────────────────────────────────────
            // GAME LOOP & UPDATE
            // ────────────────────────────────────────────
            gameLoop() {
                if (!this.sessionActive) return;

                const now = Date.now();
                const deltaTime = (now - this.lastUpdateTime) / 1000;
                this.lastUpdateTime = now;

                // Update session timer
                this.sessionTimeRemaining -= deltaTime;
                if (this.sessionTimeRemaining <= 0) {
                    this.endSession();
                    return;
                }

                // Update game state
                this.update(deltaTime);
                this.draw();

                requestAnimationFrame(() => this.gameLoop());
            },

            update(deltaTime) {
                // Update frog death timer
                if (this.frogDeathTimer > 0) {
                    this.frogDeathTimer -= deltaTime;
                    if (this.frogDeathTimer <= 0) {
                        this.resetCrossing();
                    }
                    return;
                }

                // Update vehicles
                for (let vehicle of this.vehicles) {
                    vehicle.x += vehicle.speed * deltaTime;
                    if (vehicle.speed > 0 && vehicle.x > this.gridWidth + vehicle.width) {
                        vehicle.x = -vehicle.width;
                    } else if (vehicle.speed < 0 && vehicle.x < -vehicle.width) {
                        vehicle.x = this.gridWidth;
                    }
                }

                // Update logs
                for (let log of this.logs) {
                    log.x += log.speed * deltaTime;
                    if (log.speed > 0 && log.x > this.gridWidth + log.length) {
                        log.x = -log.length;
                    } else if (log.speed < 0 && log.x < -log.length) {
                        log.x = this.gridWidth;
                    }
                }

                // Check collisions with vehicles
                for (let vehicle of this.vehicles) {
                    if (this.frogY === vehicle.y &&
                        this.frogX >= vehicle.x - vehicle.width * 0.5 &&
                        this.frogX <= vehicle.x + vehicle.width + 0.5) {
                        this.frogDeath('vehicle');
                        return;
                    }
                }

                // Check if on river without log
                if (this.riverLanes.includes(this.frogY)) {
                    let onLog = false;
                    for (let log of this.logs) {
                        if (this.frogY === log.y &&
                            this.frogX >= log.x &&
                            this.frogX <= log.x + log.length) {
                            onLog = true;
                            // Move frog with log
                            this.frogX += log.speed * deltaTime;
                            break;
                        }
                    }
                    if (!onLog) {
                        this.frogDeath('water');
                        return;
                    }
                }

                // Check drop collection
                for (let i = this.drops.length - 1; i >= 0; i--) {
                    const drop = this.drops[i];
                    if (this.frogX === drop.x && this.frogY === drop.y) {
                        this.collectDrop(drop);
                        this.drops.splice(i, 1);
                    }
                }

                // Check goal zone
                if (this.frogY === this.goalZone) {
                    for (let i = 0; i < this.goalProblems.length; i++) {
                        if (this.frogX === 1 + i * 2) {
                            const problem = this.goalProblems[i];
                            if (this.frogValue === problem.answer) {
                                this.successfulCrossing(problem.answer);
                                this.flashGoalEquation(i, true);
                                return;
                            } else {
                                this.flashGoalEquation(i, false);
                                this.playSound('wrong');
                                // Bounce back
                                this.frogY += 1;
                                return;
                            }
                        }
                    }
                }
            },

            collectDrop(drop) {
                const oldValue = this.frogValue;
                switch (drop.operation) {
                    case '+':
                        this.frogValue += drop.value;
                        break;
                    case '-':
                        this.frogValue = Math.max(0, this.frogValue - drop.value);
                        break;
                    case '*':
                        this.frogValue *= drop.value;
                        break;
                    case '/':
                        if (this.frogValue % drop.value === 0) {
                            this.frogValue = Math.floor(this.frogValue / drop.value);
                        }
                        break;
                }
                this.playSound('pickup');
                this.updateHUD();
            },

            flashGoalEquation(index, correct) {
                const equations = document.querySelectorAll('.goal-equation');
                if (equations[index]) {
                    const eq = equations[index];
                    eq.classList.add(correct ? 'correct' : 'incorrect');
                    setTimeout(() => {
                        eq.classList.remove('correct', 'incorrect');
                    }, 300);
                }
            },

            // ────────────────────────────────────────────
            // RENDERING
            // ────────────────────────────────────────────
            draw() {
                const ctx = this.ctx;
                const cellSize = this.cellSize;

                // Clear canvas with sky gradient
                const gradient = ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(1, '#1565C0');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw grid background
                this.drawGridBackground();

                // Draw logs
                for (let log of this.logs) {
                    this.drawLog(log, cellSize);
                }

                // Draw vehicles
                for (let vehicle of this.vehicles) {
                    this.drawVehicle(vehicle, cellSize);
                }

                // Draw drops
                for (let drop of this.drops) {
                    this.drawDrop(drop, cellSize);
                }

                // Draw frog
                this.drawFrog(cellSize);

                // Draw HUD
                this.updateHUD();
            },

            drawGridBackground() {
                const ctx = this.ctx;
                const cellSize = this.cellSize;

                // Helper to draw tiled pattern
                const drawTiledPattern = (tileImage, lanes) => {
                    if (!tileImage || !tileImage.complete) return false;

                    for (let lane of lanes) {
                        for (let x = 0; x < this.canvas.width; x += cellSize) {
                            ctx.drawImage(tileImage, x, lane * cellSize, cellSize, cellSize);
                        }
                    }
                    return true;
                };

                // Draw goal zone (grass tiles)
                drawTiledPattern(this.images.grass_tile, [0]);

                // Draw lily pad goal zones at specific positions (1, 3, 5, 7, 9)
                if (this.images.lilypad && this.images.lilypad.complete) {
                    for (let i = 0; i < 5; i++) {
                        const x = 1 + i * 2;
                        ctx.drawImage(this.images.lilypad, x * cellSize, 0, cellSize, cellSize);
                    }
                } else {
                    // Fallback for lily pads
                    ctx.fillStyle = '#90EE90';
                    for (let i = 0; i < 5; i++) {
                        const x = 1 + i * 2;
                        ctx.fillRect(x * cellSize + 4, 4, cellSize - 8, cellSize - 8);
                        ctx.strokeStyle = '#228B22';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x * cellSize + 4, 4, cellSize - 8, cellSize - 8);
                    }
                }

                // Draw road lanes
                drawTiledPattern(this.images.road_tile, this.roadLanes);

                // Draw median (grass)
                drawTiledPattern(this.images.grass_tile, [this.medianZone]);

                // Draw river lanes
                drawTiledPattern(this.images.river_tile, this.riverLanes);

                // Draw start zone (grass)
                drawTiledPattern(this.images.grass_tile, [this.startZone]);
            },

            drawFrog(cellSize) {
                const ctx = this.ctx;
                const x = this.frogX * cellSize;
                const y = this.frogY * cellSize;

                if (this.frogDeathTimer > 0) {
                    ctx.globalAlpha = this.frogDeathTimer / 0.8;
                }

                // Draw frog with rotation based on direction
                ctx.save();
                ctx.translate(x + cellSize / 2, y + cellSize / 2);

                // Rotate: 0=up (0°), 1=right (90°), 2=down (180°), 3=left (-90°)
                const rotations = [0, Math.PI / 2, Math.PI, -Math.PI / 2];
                ctx.rotate(rotations[this.frogDirection] || 0);

                // Draw frog - always use fallback for reliability
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.ellipse(0, -5, cellSize * 0.25, cellSize * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(0, 0, cellSize * 0.3, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(-cellSize * 0.1, -cellSize * 0.05, cellSize * 0.08, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cellSize * 0.1, -cellSize * 0.05, cellSize * 0.08, 0, Math.PI * 2);
                ctx.fill();

                // Pupils
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(-cellSize * 0.1, -cellSize * 0.05, cellSize * 0.04, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cellSize * 0.1, -cellSize * 0.05, cellSize * 0.04, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();

                // Draw frog value badge
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#FFD600';
                ctx.beginPath();
                ctx.arc(x + cellSize * 0.7, y + cellSize * 0.7, cellSize * 0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#333333';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#000000';
                ctx.font = `bold ${cellSize * 0.3}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.frogValue, x + cellSize * 0.7, y + cellSize * 0.7);

                ctx.globalAlpha = 1;
            },

            drawVehicle(vehicle, cellSize) {
                const ctx = this.ctx;
                const x = vehicle.x * cellSize;
                const y = vehicle.y * cellSize;
                const width = vehicle.width * cellSize;
                const height = cellSize;

                if (vehicle.isTruck) {
                    // Trucks always face backwards
                    const truckColors = [this.images.truck_red, this.images.truck_green];
                    const truckSprite = truckColors[vehicle.spriteIndex % truckColors.length];

                    if (truckSprite && truckSprite.complete) {
                        ctx.save();
                        ctx.scale(-1, 1);
                        ctx.drawImage(truckSprite, -x - width, y, width, height);
                        ctx.restore();
                    } else {
                        // Fallback
                        ctx.fillStyle = '#6D4C41';
                        ctx.fillRect(x, y, width, height);
                    }
                } else {
                    // Draw car sprite with correct orientation
                    const carSprites = [this.images.car_red, this.images.car_blue, this.images.car_yellow];
                    const carSprite = carSprites[vehicle.spriteIndex % carSprites.length];

                    if (carSprite && carSprite.complete) {
                        ctx.save();
                        if (vehicle.speed < 0) {
                            ctx.scale(-1, 1);
                            ctx.drawImage(carSprite, -x - width, y, width, height);
                        } else {
                            ctx.drawImage(carSprite, x, y, width, height);
                        }
                        ctx.restore();
                    } else {
                        // Fallback
                        ctx.fillStyle = '#E53935';
                        ctx.fillRect(x, y, width, height);
                    }
                }
            },

            drawLog(log, cellSize) {
                const ctx = this.ctx;
                const x = log.x * cellSize;
                const y = log.y * cellSize;
                const width = log.length * cellSize;
                const height = cellSize;

                // Select log sprite
                const logSprite = log.length > 3 ? this.images.log_long : this.images.log_short;

                if (logSprite && logSprite.complete) {
                    ctx.drawImage(logSprite, x, y, width, height);
                } else {
                    // Fallback
                    ctx.fillStyle = '#8D6E63';
                    ctx.fillRect(x, y, width, height);

                    // Wood texture
                    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < log.length; i++) {
                        ctx.beginPath();
                        ctx.moveTo(x + (i + 1) * cellSize, y);
                        ctx.lineTo(x + (i + 1) * cellSize, y + height);
                        ctx.stroke();
                    }
                }
            },

            drawDrop(drop, cellSize) {
                const ctx = this.ctx;
                const x = drop.x * cellSize;
                const y = drop.y * cellSize;
                const centerX = x + cellSize / 2;
                const centerY = y + cellSize / 2;
                const radius = cellSize * 0.28;

                // Always draw bright, visible collectible
                // Glow effect
                ctx.fillStyle = 'rgba(255, 214, 0, 0.4)';
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius * 1.8, 0, Math.PI * 2);
                ctx.fill();

                // Drop orb with gradient
                const gradient = ctx.createRadialGradient(centerX - radius * 0.3, centerY - radius * 0.3, 0, centerX, centerY, radius);
                gradient.addColorStop(0, '#FFFF00');
                gradient.addColorStop(0.7, '#FFD600');
                gradient.addColorStop(1, '#F5A623');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fill();

                // Outer ring
                ctx.strokeStyle = '#DAA520';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw value text - always visible and readable
                let valueText = '';
                switch (drop.operation) {
                    case '+':
                        valueText = `+${drop.value}`;
                        break;
                    case '-':
                        valueText = `-${drop.value}`;
                        break;
                    case '*':
                        valueText = `×${drop.value}`;
                        break;
                    case '/':
                        valueText = `÷${drop.value}`;
                        break;
                }

                ctx.fillStyle = '#000000';
                ctx.font = `bold ${cellSize * 0.4}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(valueText, centerX, centerY);
            },

            // ────────────────────────────────────────────
            // INPUT HANDLING
            // ────────────────────────────────────────────
            handleKeyPress(e) {
                if (!this.sessionActive || this.frogDeathTimer > 0) return;

                const key = e.key.toLowerCase();
                let newX = this.frogX;
                let newY = this.frogY;
                let direction = this.frogDirection;

                switch (key) {
                    case 'arrowup':
                    case 'w':
                        newY--;
                        direction = 0; // up
                        break;
                    case 'arrowdown':
                    case 's':
                        newY++;
                        direction = 2; // down
                        break;
                    case 'arrowleft':
                    case 'a':
                        newX--;
                        direction = 3; // left
                        break;
                    case 'arrowright':
                    case 'd':
                        newX++;
                        direction = 1; // right
                        break;
                    default:
                        return;
                }

                // Boundary check
                if (newX >= 0 && newX < this.gridWidth && newY >= 0 && newY < this.gridHeight) {
                    this.frogX = newX;
                    this.frogY = newY;
                    this.frogDirection = direction;
                    this.playSound('hop');
                }

                e.preventDefault();
            },

            handleTouch(e) {
                if (!this.sessionActive || this.frogDeathTimer > 0) return;

                const touch = e.touches[0];
                const rect = this.canvas.getBoundingClientRect();
                const touchX = touch.clientX - rect.left;
                const touchY = touch.clientY - rect.top;

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const dx = touchX - centerX;
                const dy = touchY - centerY;

                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) {
                        this.handleKeyPress({ key: 'ArrowRight', preventDefault: () => { } });
                    } else {
                        this.handleKeyPress({ key: 'ArrowLeft', preventDefault: () => { } });
                    }
                } else {
                    if (dy > 0) {
                        this.handleKeyPress({ key: 'ArrowDown', preventDefault: () => { } });
                    } else {
                        this.handleKeyPress({ key: 'ArrowUp', preventDefault: () => { } });
                    }
                }
            },

            // ────────────────────────────────────────────
            // AUDIO & FEEDBACK
            // ────────────────────────────────────────────
            playSound(type) {
                // Play HTML5 audio file
                if (this.audio[type]) {
                    try {
                        const audioClone = this.audio[type].cloneNode();
                        audioClone.volume = 0.5;
                        audioClone.currentTime = 0;
                        audioClone.play().catch(() => {
                            // Silently fail if audio cannot play
                        });
                    } catch (e) {
                        // Silently fail
                    }
                }
            },

            showScorePopup(x, y, text) {
                const popup = document.createElement('div');
                popup.className = 'score-popup';
                popup.textContent = text;
                popup.style.left = (x * this.cellSize + this.cellSize / 2) + 'px';
                popup.style.top = (y * this.cellSize + this.cellSize / 2) + 'px';
                this.canvas.parentElement.appendChild(popup);
                setTimeout(() => popup.remove(), 1000);
            },

            // ────────────────────────────────────────────
            // UI MANAGEMENT
            // ────────────────────────────────────────────
            showScreen(screenName) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(`screen-${screenName}`).classList.add('active');
            },

            updateHUD() {
                const minutes = Math.floor(this.sessionTimeRemaining / 60);
                const seconds = Math.floor(this.sessionTimeRemaining % 60);
                document.getElementById('timer').textContent =
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                document.getElementById('score').textContent = this.score;
                document.getElementById('frog-value').textContent = this.frogValue;
            }
        };

        // Initialize game immediately
        game.init();
    </script>
